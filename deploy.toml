# rac — WsprDaemon Remote Access Channel (frpc reverse tunnel for admin access).
# Infrastructure component: provisions frpc + wd-rac.service via install.sh.
[component]
name        = "rac"
kind        = "infra"
description = "Remote Access Channel — frpc reverse tunnel to gw2.wsprdaemon.org for admin SSH/web behind NAT"

[systemd]
units = ["wd-rac.service"]

# install.sh does the work (vendored frpc + CA + unit + config template).
# No `kind=link` steps: frpc is installed as a real file, not a symlink.
